<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Three.js World — Assignment 5</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    #hud {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      color: #fff; background: rgba(0,0,0,0.6); padding: 6px 16px;
      border-radius: 8px; font-size: 13px; pointer-events: none; text-align: center;
    }
    #score {
      position: fixed; top: 10px; right: 15px;
      color: #ffd700; background: rgba(0,0,0,0.65); padding: 7px 14px;
      border-radius: 8px; font-size: 15px; font-weight: bold;
    }
    #daytime {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: #ccc; background: rgba(0,0,0,0.5); padding: 4px 14px;
      border-radius: 6px; font-size: 12px; pointer-events: none;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">Orbit: Left-drag &nbsp;|&nbsp; Zoom: Scroll &nbsp;|&nbsp; Pan: Right-drag &nbsp;|&nbsp; Fly your camera into glowing orbs to collect them!</div>
  <div id="score">Orbs: 0 / 10</div>
  <div id="daytime">Dawn</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

    // ── Renderer ──────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ── Scene ─────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog   = new THREE.Fog(0x000011, 80, 300);

    // ── Perspective Camera ────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 18, 45);

    // ── Orbit Controls ────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.set(0, 5, 0);
    controls.minDistance   = 4;
    controls.maxDistance   = 130;

    // ─────────────────────────────────────────────────────────────────────────
    // SKYBOX — six canvas faces forming a CubeTexture (space / nebula theme)
    // ─────────────────────────────────────────────────────────────────────────
    function xorRng(seed) {
      let s = seed | 1;
      return () => { s ^= s << 13; s ^= s >> 17; s ^= s << 5; return (s >>> 0) / 0xFFFFFFFF; };
    }

    function makeSkyFace(topColor, botColor, starSeed, nebulaRgba) {
      const cv  = document.createElement('canvas');
      cv.width  = cv.height = 512;
      const ctx = cv.getContext('2d');

      const grad = ctx.createLinearGradient(0, 0, 0, 512);
      grad.addColorStop(0, topColor);
      grad.addColorStop(1, botColor);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 512, 512);

      if (nebulaRgba) {
        const r = xorRng(starSeed + 77);
        ctx.filter = 'blur(28px)';
        ctx.fillStyle = nebulaRgba;
        ctx.beginPath();
        ctx.ellipse(r() * 512, r() * 512, 130, 75, r() * Math.PI, 0, Math.PI * 2);
        ctx.fill();
        ctx.filter = 'none';
      }

      const r = xorRng(starSeed);
      for (let i = 0; i < 160; i++) {
        const alpha = (0.35 + r() * 0.65).toFixed(2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(r() * 512, r() * 512, r() * 1.7 + 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      return cv;
    }

    const skyFaces = [
      makeSkyFace('#040818','#080a20', 11, 'rgba(60,20,120,0.35)'),
      makeSkyFace('#040818','#080a20', 22, 'rgba(20,60,100,0.30)'),
      makeSkyFace('#020510','#040818', 33, null),
      makeSkyFace('#060a22','#0a0e28', 44, 'rgba(80,10,60,0.25)'),
      makeSkyFace('#040818','#080a20', 55, 'rgba(30,80,120,0.30)'),
      makeSkyFace('#040818','#080a20', 66, 'rgba(60,10,80,0.30)'),
    ];
    const skyTex = new THREE.CubeTexture(skyFaces);
    skyTex.needsUpdate = true;
    scene.background   = skyTex;

    // ─────────────────────────────────────────────────────────────────────────
    // LIGHTS — 5 distinct types
    // ─────────────────────────────────────────────────────────────────────────

    // 1. AmbientLight
    const ambientLight = new THREE.AmbientLight(0x223355, 0.4);
    scene.add(ambientLight);

    // 2. DirectionalLight (sun, casts shadows)
    const sunLight = new THREE.DirectionalLight(0xffeedd, 1.6);
    sunLight.castShadow             = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.near     = 1;
    sunLight.shadow.camera.far      = 260;
    sunLight.shadow.camera.left     = -75;
    sunLight.shadow.camera.right    = 75;
    sunLight.shadow.camera.top      = 75;
    sunLight.shadow.camera.bottom   = -75;
    sunLight.shadow.bias            = -0.002;
    scene.add(sunLight);

    // 3. HemisphereLight (sky vs ground fill)
    const hemiLight = new THREE.HemisphereLight(0x4488cc, 0x226633, 0.5);
    scene.add(hemiLight);

    // 4. PointLight (orbiting warm glow)
    const pointLight = new THREE.PointLight(0xff6633, 3, 35);
    pointLight.castShadow = true;
    scene.add(pointLight);

    // 5. SpotLight (cool highlight on tower)
    const spotLight = new THREE.SpotLight(0x00ccff, 4, 65, Math.PI / 9, 0.35, 1);
    spotLight.position.set(-18, 30, 12);
    spotLight.target.position.set(0, 10, 0);
    spotLight.castShadow = true;
    spotLight.shadow.mapSize.set(1024, 1024);
    scene.add(spotLight);
    scene.add(spotLight.target);

    // ─────────────────────────────────────────────────────────────────────────
    // PROCEDURAL CANVAS TEXTURES
    // ─────────────────────────────────────────────────────────────────────────
    function canvasTex(drawFn, size, repU, repV) {
      const cv = document.createElement('canvas');
      cv.width = cv.height = size;
      drawFn(cv.getContext('2d'), size);
      const t = new THREE.CanvasTexture(cv);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(repU, repV);
      return t;
    }

    const stoneTex = canvasTex((ctx, sz) => {
      ctx.fillStyle = '#7a7a7a';
      ctx.fillRect(0, 0, sz, sz);
      const r = xorRng(42);
      for (let i = 0; i < 600; i++) {
        const v = (r() * 60 - 30) | 0;
        ctx.fillStyle = `rgb(${120+v},${120+v},${120+v})`;
        ctx.fillRect(r()*sz, r()*sz, r()*9+2, r()*9+2);
      }
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 2;
      for (let y = 0; y < sz; y += 32) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(sz, y); ctx.stroke();
      }
      for (let row = 0; row < 8; row++) {
        const off = (row % 2) * 32;
        for (let x = off; x < sz; x += 64) {
          ctx.beginPath(); ctx.moveTo(x, row*32); ctx.lineTo(x, (row+1)*32); ctx.stroke();
        }
      }
    }, 256, 3, 3);

    const grassTex = canvasTex((ctx, sz) => {
      ctx.fillStyle = '#3a7a2a';
      ctx.fillRect(0, 0, sz, sz);
      const r = xorRng(7);
      for (let i = 0; i < 400; i++) {
        const v = (r() * 50 - 25) | 0;
        ctx.fillStyle = `rgb(${58+v},${122+v},${42+v})`;
        ctx.fillRect(r()*sz, r()*sz, r()*7+2, r()*7+2);
      }
    }, 256, 10, 10);

    const metalTex = canvasTex((ctx, sz) => {
      const g = ctx.createLinearGradient(0, 0, sz, sz);
      g.addColorStop(0, '#b0b8c0'); g.addColorStop(0.5, '#d8e0e8'); g.addColorStop(1, '#909aa0');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, sz, sz);
      ctx.strokeStyle = 'rgba(0,0,0,0.18)';
      ctx.lineWidth = 1;
      for (let i = 0; i < sz; i += 16) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(sz, i); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, sz); ctx.stroke();
      }
    }, 256, 2, 2);

    const lavaTex = canvasTex((ctx, sz) => {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, sz, sz);
      const r = xorRng(99);
      for (let i = 0; i < 300; i++) {
        const heat = r();
        if (heat > 0.82) {
          ctx.fillStyle = `rgba(255,${(heat * 220) | 0},0,0.9)`;
          ctx.beginPath(); ctx.arc(r()*sz, r()*sz, r()*7+1, 0, Math.PI*2); ctx.fill();
        } else {
          const v = (r() * 40) | 0;
          ctx.fillStyle = `rgb(${26+v},${26+v},${26+v})`;
          ctx.fillRect(r()*sz, r()*sz, r()*12+3, r()*12+3);
        }
      }
    }, 256, 1, 1);

    const crystalTex = canvasTex((ctx, sz) => {
      const g = ctx.createLinearGradient(0, 0, sz, sz);
      g.addColorStop(0, '#aa44ff'); g.addColorStop(0.3, '#4488ff');
      g.addColorStop(0.6, '#44ffcc'); g.addColorStop(1, '#ff44aa');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, sz, sz);
      const r = xorRng(12);
      ctx.globalAlpha = 0.45;
      for (let i = 0; i < 30; i++) {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillRect(r()*sz, r()*sz, r()*4+1, r()*45+5);
      }
      ctx.globalAlpha = 1;
    }, 256, 1, 1);

    // ─────────────────────────────────────────────────────────────────────────
    // MATERIALS
    // ─────────────────────────────────────────────────────────────────────────
    const matStone   = new THREE.MeshPhongMaterial({ map: stoneTex });
    const matGrass   = new THREE.MeshPhongMaterial({ map: grassTex });
    const matMetal   = new THREE.MeshPhongMaterial({ map: metalTex, shininess: 90 });
    const matLava    = new THREE.MeshPhongMaterial({ map: lavaTex, emissive: 0x440a00, emissiveIntensity: 0.4 });
    const matCrystal = new THREE.MeshPhongMaterial({ map: crystalTex, shininess: 200, specular: 0xffffff });
    const matGold    = new THREE.MeshPhongMaterial({ color: 0xffd700, shininess: 180, specular: 0xffffaa });
    const matGlass   = new THREE.MeshPhongMaterial({ color: 0x88bbff, transparent: true, opacity: 0.28, shininess: 200, side: THREE.DoubleSide });
    const matGlow    = new THREE.MeshBasicMaterial({ color: 0xff8844 });
    const matCyan    = new THREE.MeshPhongMaterial({ color: 0x00ffcc, shininess: 120, specular: 0xffffff });
    const matOrb     = new THREE.MeshPhongMaterial({ color: 0xffee44, emissive: 0xffaa00, emissiveIntensity: 0.6, shininess: 200 });
    const matPurple  = new THREE.MeshPhongMaterial({ color: 0x9933ff, shininess: 100, specular: 0xddaaff });

    // ─────────────────────────────────────────────────────────────────────────
    // SCENE OBJECTS — 30+ primary shapes (well above the 20 required)
    // ─────────────────────────────────────────────────────────────────────────
    function addMesh(geo, mat, x, y, z, shadows = true) {
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, y, z);
      if (shadows) { m.castShadow = true; m.receiveShadow = true; }
      scene.add(m);
      return m;
    }

    // #1  Ground (Box)
    addMesh(new THREE.BoxGeometry(90, 1, 90), matGrass, 0, -0.5, 0);

    // #2  Raised central platform (Box)
    addMesh(new THREE.BoxGeometry(14, 0.6, 14), matMetal, 0, 0.3, 0);

    // #3–5  Central tower — 3 stacked boxes
    addMesh(new THREE.BoxGeometry(5, 10, 5),    matStone, 0, 5.5,  0);
    addMesh(new THREE.BoxGeometry(7, 0.6, 7),   matStone, 0, 10.8, 0);
    addMesh(new THREE.BoxGeometry(3.5, 5, 3.5), matStone, 0, 14,   0);

    // #6  Glass dome half-sphere on top of tower
    addMesh(new THREE.SphereGeometry(3.5, 20, 10, 0, Math.PI*2, 0, Math.PI/2), matGlass, 0, 16.5, 0);

    // #7–12  Outer stone pillars (Cylinder × 6)
    const pillarAngles = Array.from({ length: 6 }, (_, i) => i / 6 * Math.PI * 2);
    pillarAngles.forEach(a => {
      addMesh(new THREE.CylinderGeometry(0.9, 1.2, 14, 10), matStone,
        Math.cos(a) * 20, 7, Math.sin(a) * 20);
    });

    // #13–18  Pillar caps (Sphere × 6)
    pillarAngles.forEach(a => {
      addMesh(new THREE.SphereGeometry(1.3, 10, 10), matGold,
        Math.cos(a) * 20, 14.5, Math.sin(a) * 20);
    });

    // #19–20  Animated torus rings around tower
    const torus1 = addMesh(new THREE.TorusGeometry(4.5, 0.35, 16, 60), matGold, 0, 12, 0);
    const torus2 = addMesh(new THREE.TorusGeometry(6.0, 0.25, 12, 60), matCyan, 0, 12, 0);

    // #21–24  Corner obelisk columns (Box × 4)
    [[-28,-28],[28,-28],[-28,28],[28,28]].forEach(([x, z]) => {
      addMesh(new THREE.BoxGeometry(2, 8, 2), matStone, x, 4, z);
    });

    // #25–28  Obelisk tips (Cone × 4)
    [[-28,-28],[28,-28],[-28,28],[28,28]].forEach(([x, z]) => {
      addMesh(new THREE.ConeGeometry(1.2, 3, 6), matGold, x, 9.5, z);
    });

    // #29–31  Lava rock boulders (Sphere × 3)
    addMesh(new THREE.SphereGeometry(2.2, 10, 8), matLava, -12, 2.2, 18);
    addMesh(new THREE.SphereGeometry(1.6, 10, 8), matLava, -14, 1.6, 20);
    addMesh(new THREE.SphereGeometry(1.0, 10, 8), matLava, -10, 1.0, 17);

    // #32  Crystal gem (Octahedron) — textured with crystalTex
    const gem = addMesh(new THREE.OctahedronGeometry(2), matCrystal, 15, 5, -15);

    // #33–37  Floating animated boxes (Box × 5)
    const floatStart = [[-9,15,0],[9,17,0],[0,15,9],[0,17,-9],[-7,19,-7]];
    const floatBoxes = floatStart.map(([x, y, z]) =>
      addMesh(new THREE.BoxGeometry(1.6, 1.6, 1.6), matMetal, x, y, z)
    );

    // #38  Point-light marker (Sphere, unlit)
    const plMarker = addMesh(new THREE.SphereGeometry(0.4, 8, 8), matGlow, 0, 5, 0, false);

    // #39–44  Small accent cylinders between pillars (Cylinder × 6)
    pillarAngles.forEach(a => {
      const mid = a + Math.PI / 6;
      addMesh(new THREE.CylinderGeometry(0.3, 0.3, 3, 8), matPurple,
        Math.cos(mid) * 12, 1.5, Math.sin(mid) * 12);
    });

    // Total: 44 primary shapes  ✅ (> 20 required)

    // ─────────────────────────────────────────────────────────────────────────
    // 3-D MODEL — Flamingo.glb from Three.js CDN (GLTFLoader, textured & animated)
    // ─────────────────────────────────────────────────────────────────────────
    const animMixers = [];
    new GLTFLoader().load(
      'https://threejs.org/examples/models/gltf/Flamingo.glb',
      gltf => {
        const model = gltf.scene;
        model.scale.setScalar(0.022);
        model.position.set(-6, 9, 0);
        model.traverse(child => {
          if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
        });
        scene.add(model);
        if (gltf.animations.length > 0) {
          const mixer = new THREE.AnimationMixer(model);
          mixer.clipAction(gltf.animations[0]).play();
          animMixers.push(mixer);
        }
      },
      undefined,
      err => console.warn('GLTFLoader (needs a local server):', err)
    );

    // ─────────────────────────────────────────────────────────────────────────
    // WOW POINT — Dynamic Day/Night Cycle  +  Collectible Orb Mini-Game
    //
    // The sun physically orbits the scene.  Ambient, directional, and
    // hemisphere lights all smoothly change colour and intensity to simulate
    // dawn → noon → dusk → night.  Fog colour matches the sky.
    // Ten glowing orbs are scattered around the world; orbit the camera close
    // enough to any orb to collect it, scoring a point.
    // ─────────────────────────────────────────────────────────────────────────

    // Collectible orbs
    const ORB_POSITIONS = [
      [6,3,6], [-6,4,-6], [12,5,12], [-12,3,12],
      [0,7,-18], [18,4,-6], [-18,5,6], [9,9,-9], [-9,3,9], [0,13,0]
    ];
    const orbs = ORB_POSITIONS.map(([x, y, z]) => {
      const mesh  = addMesh(new THREE.SphereGeometry(0.55, 16, 16), matOrb, x, y, z, false);
      const glow  = new THREE.PointLight(0xffcc00, 1.5, 6);
      glow.position.set(x, y, z);
      scene.add(glow);
      return { mesh, glow, baseY: y, collected: false };
    });

    let score = 0;
    const scoreEl   = document.getElementById('score');
    const daytimeEl = document.getElementById('daytime');

    // Day/Night
    let dayTime = 0.15; // 0–1 → 0–2π
    const timeLabels = ['Night','Dawn','Morning','Noon','Afternoon','Dusk','Night'];

    function updateDayNight(dt) {
      dayTime = (dayTime + dt * 0.018) % 1;
      const angle = dayTime * Math.PI * 2;
      const dayF  = Math.max(0, Math.sin(angle));

      sunLight.position.set(
        Math.cos(angle - Math.PI / 2) * 100,
        Math.sin(angle - Math.PI / 2) * 80,
        40
      );
      sunLight.intensity     = dayF * 1.8 + 0.05;
      sunLight.color.setHSL(0.08 - dayF * 0.02, 0.5, 0.45 + dayF * 0.3);

      ambientLight.intensity = 0.08 + dayF * 0.42;
      ambientLight.color.setHSL(0.62 - dayF * 0.04, 0.3, 0.25 + dayF * 0.45);

      hemiLight.intensity    = 0.1 + dayF * 0.45;
      hemiLight.color.setHSL(0.55 + dayF * 0.05, 0.5, 0.4 + dayF * 0.2);

      scene.fog.color.setHSL(0.60 - dayF * 0.03, 0.3 + dayF * 0.4, 0.01 + dayF * 0.55);

      daytimeEl.textContent = timeLabels[Math.round(dayTime * 6) % 7];
    }

    // ── Resize ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Animation Loop ────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const t  = clock.getElapsedTime();

      controls.update();

      // Torus rings spin on independent axes
      torus1.rotation.x = t * 0.90;
      torus1.rotation.z = t * 0.55;
      torus2.rotation.y = t * 0.65;
      torus2.rotation.x = t * 0.35;

      // Crystal gem slowly rotates
      gem.rotation.y = t * 0.6;
      gem.rotation.x = Math.sin(t * 0.4) * 0.3;

      // Floating boxes bob and tumble
      floatBoxes.forEach((b, i) => {
        b.position.y = floatStart[i][1] + Math.sin(t * 1.5 + i * 1.3) * 1.0;
        b.rotation.x = t * 0.8 + i * 0.7;
        b.rotation.y = t * 0.55 + i * 0.4;
      });

      // Orbiting point light
      pointLight.position.set(
        Math.cos(t * 0.65) * 12,
        5 + Math.sin(t * 0.9) * 2.5,
        Math.sin(t * 0.65) * 12
      );
      plMarker.position.copy(pointLight.position);

      // Orb float animation + camera-proximity collection
      orbs.forEach(orb => {
        if (orb.collected) return;
        orb.mesh.position.y = orb.baseY + Math.sin(t * 2.2 + orb.baseY) * 0.45;
        orb.mesh.rotation.y = t * 2.5;
        orb.glow.position.copy(orb.mesh.position);

        if (camera.position.distanceTo(orb.mesh.position) < 4.5) {
          orb.collected       = true;
          orb.mesh.visible    = false;
          orb.glow.intensity  = 0;
          score++;
          const total = orbs.length;
          scoreEl.textContent = score >= total
            ? '⭐  All orbs collected!  ⭐'
            : `Orbs: ${score} / ${total}`;
        }
      });

      updateDayNight(dt);
      animMixers.forEach(m => m.update(dt));

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
